<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tanach Songs | Submit</title>
    <link rel="stylesheet" href="../shared/styles.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Share A Tanach Song</h1>
        <p>Anyone can submit. Submissions are reviewed by an admin before public listing.</p>
      </section>

      <section class="grid">
        <article class="card">
          <h2>New Submission</h2>
          <form id="song-form">
            <label for="title">Title (required)</label>
            <input id="title" name="title" required maxlength="180" />

            <div class="row">
              <div>
                <label for="artist_name">Artist</label>
                <input id="artist_name" name="artist_name" maxlength="180" />
              </div>
              <div>
                <label for="composer_name">Composer</label>
                <input id="composer_name" name="composer_name" maxlength="180" />
              </div>
            </div>

            <label for="source_url">Source URL</label>
            <input id="source_url" name="source_url" type="url" maxlength="300" />

            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" maxlength="2000"></textarea>

            <button id="submit-btn" type="submit">Submit Song</button>
            <p id="submit-status" class="status" aria-live="polite"></p>
          </form>
        </article>

        <article class="card">
          <h2>Recently Approved</h2>
          <p>These are already visible to everyone.</p>
          <div id="approved-list"></div>
          <button id="refresh-approved" class="secondary" type="button">Refresh</button>
        </article>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
