<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tanach Songs | Submit</title>
    <link rel="stylesheet" href="../shared/styles.css" />
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Share A Tanach Song</h1>
        <p>Anyone can submit. Verse links are selected from Tanach only (no free text).</p>
      </section>

      <section class="grid">
        <article class="card">
          <h2>New Submission</h2>
          <form id="song-form">
            <label for="title">Title (required)</label>
            <input id="title" name="title" required maxlength="180" />

            <div class="row">
              <div>
                <label for="artist_name">Artist</label>
                <input id="artist_name" name="artist_name" maxlength="180" />
              </div>
              <div>
                <label for="composer_name">Composer</label>
                <input id="composer_name" name="composer_name" maxlength="180" />
              </div>
            </div>

            <label for="source_url">Source URL</label>
            <input id="source_url" name="source_url" type="url" maxlength="300" />

            <h3>Exact Verse Links</h3>
            <div class="row">
              <div>
                <label for="exact_book">Book</label>
                <select id="exact_book"></select>
              </div>
              <div>
                <label for="exact_chapter">Chapter</label>
                <select id="exact_chapter"></select>
              </div>
            </div>
            <label for="exact_verse">Verse</label>
            <select id="exact_verse"></select>
            <button id="add-exact" class="secondary" type="button">Add Exact Verse</button>
            <div id="exact-selected" class="status"></div>

            <h3>Optional Range Link</h3>
            <div class="row">
              <div>
                <label for="range_start_book">Range Start Book</label>
                <select id="range_start_book"></select>
              </div>
              <div>
                <label for="range_start_chapter">Range Start Chapter</label>
                <select id="range_start_chapter"></select>
              </div>
            </div>
            <label for="range_start_verse">Range Start Verse</label>
            <select id="range_start_verse"></select>

            <div class="row">
              <div>
                <label for="range_end_book">Range End Book</label>
                <select id="range_end_book"></select>
              </div>
              <div>
                <label for="range_end_chapter">Range End Chapter</label>
                <select id="range_end_chapter"></select>
              </div>
            </div>
            <label for="range_end_verse">Range End Verse</label>
            <select id="range_end_verse"></select>

            <label for="range_relationship_type">Range Type</label>
            <select id="range_relationship_type" name="range_relationship_type">
              <option value="quotation">quotation (recommended)</option>
              <option value="theme">theme</option>
              <option value="allusion">allusion</option>
              <option value="exact">exact</option>
            </select>

            <label for="notes">Notes</label>
            <textarea id="notes" name="notes" maxlength="2000"></textarea>

            <button id="submit-btn" type="submit">Submit Song</button>
            <p id="submit-status" class="status" aria-live="polite"></p>
          </form>
        </article>

        <article class="card">
          <h2>Recently Approved (With Links)</h2>
          <p>Only approved songs with at least one verse link appear here.</p>
          <div id="approved-list"></div>
          <button id="refresh-approved" class="secondary" type="button">Refresh</button>
        </article>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
